<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W.T.F. — Избранное</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .remove-from-wishlist-btn {
            margin: 0.75rem;
            padding: 0.6rem;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: calc(100% - 1.5rem);
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .remove-from-wishlist-btn:hover {
            transform: scale(0.98);
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.6);
            background: linear-gradient(135deg, #c0392b, #e74c3c);
        }
        .game-card {
            position: relative;
        }
        .price {
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">W.T.F.</div>
        <ul class="nav-links">
            <li><a href="index.html">Каталог</a></li>
            <li><a href="library.html">Библиотека</a></li>
            <li><a href="wishlist.html" class="active">Избранное</a></li>
            <li><a href="cart.html">Корзина <span id="cartCount">0</span></a></li>
            <li><a href="#" id="loginBtn">Вход</a></li>
        </ul>
    </nav>
    <main class="container">
        <h1>Избранное</h1>
        <div id="wishlistGrid" class="games-grid"></div>
    </main>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Вход в аккаунт</h2>
            <p class="modal-question">Выберите платформу для входа:</p>
            <div class="platform-slider">
                <div class="platform-option" data-platform="steam">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/steam.svg" alt="Steam">
                    <span>Steam</span>
                </div>
                <div class="platform-option" data-platform="gog">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/gogdotcom.svg" alt="GOG">
                    <span>GOG</span>
                </div>
                <div class="platform-option" data-platform="epic">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/epicgames.svg" alt="Epic Games">
                    <span>Epic Games</span>
                </div>
            </div>
            <button id="confirmLoginBtn" class="confirm-login-btn">Войти</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
