<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W.T.F. — Карточка игры</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .button-group {
            display: flex;
            gap: 0;
            margin: 1rem auto 0;
            width: 80%;
            justify-content: center;
        }
        #addToCartBtn {
            flex: 3;
            padding: 0.8rem 0.5rem;
            background: linear-gradient(135deg, #ff2d55, #ff6b6b);
            border: none;
            border-radius: 40px 0 0 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        #addToWishlistBtn {
            flex: 1;
            padding: 0.8rem 0.5rem;
            background: linear-gradient(135deg, #ff2d55, #ff6b6b);
            border: none;
            border-radius: 0 40px 40px 0;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        #addToCartBtn:hover, #addToWishlistBtn:hover {
            transform: scale(0.98);
            box-shadow: 0 0 15px rgba(255, 45, 85, 0.6);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #ff6b4a;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .button-group {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🎮 W.T.F.</div>
        <ul class="nav-links">
            <li><a href="index.html">Каталог</a></li>
            <li><a href="library.html">Библиотека</a></li>
            <li><a href="wishlist.html">Избранное</a></li>
            <li><a href="cart.html">🛒 Корзина <span id="cartCount">0</span></a></li>
        </ul>
    </nav>
    <main class="container" id="gameDetailContainer">
        <a href="index.html" class="back-link">← Назад в каталог</a>
        <div class="detail-card">
            <h1 id="gameTitle"></h1>
            <img id="gameImage" src="" alt="">
            <p id="gameDescription" class="game-description"></p>
            <span id="gameGenre" class="game-genre"></span>
            <p id="gamePrice" class="price"></p>
            <div class="button-group">
                <button id="addToCartBtn">🛒 В корзину</button>
                <button id="addToWishlistBtn">❤️ В избранное</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
