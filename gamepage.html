<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W.T.F. — Карточка игры</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detail-card {
            max-width: 700px;
            margin: 0 auto;
            background: #1a1f2e;
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
        }
        .detail-card img {
            width: 100%;
            border-radius: 20px;
            margin: 1rem 0;
        }
        .game-description {
            margin: 1rem 0;
            line-height: 1.5;
            color: #ccc;
            text-align: left;
        }
        .game-genre {
            display: inline-block;
            background: rgba(255, 107, 74, 0.2);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }
        .detail-card .price {
            font-size: 2rem;
            color: #ff6b4a;
            margin: 1rem 0;
        }
        .requirements {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 1rem;
            margin: 1rem 0;
            text-align: left;
        }
        .requirements h3 {
            color: #ff6b4a;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }
        .requirements ul {
            list-style: none;
            padding-left: 0;
        }
        .requirements li {
            margin: 0.3rem 0;
            font-size: 0.85rem;
            color: #aaa;
        }
        .requirements strong {
            color: #fff;
        }
        .button-group {
            display: flex;
            gap: 0;
            margin: 1rem auto 0;
            width: 80%;
            justify-content: center;
        }
        #addToCartBtn {
            flex: 3;
            padding: 0.8rem 0.5rem;
            background: linear-gradient(135deg, #ff2d55, #ff6b6b);
            border: none;
            border-radius: 40px 0 0 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        #addToWishlistBtn {
            flex: 1;
            padding: 0.8rem 0.5rem;
            background: linear-gradient(135deg, #ff2d55, #ff6b6b);
            border: none;
            border-radius: 0 40px 40px 0;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        #addToCartBtn:hover, #addToWishlistBtn:hover {
            transform: scale(0.98);
            box-shadow: 0 0 15px rgba(255, 45, 85, 0.6);
        }
        #addToCartBtn:disabled, #addToWishlistBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #ff6b4a;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .button-group {
                width: 100%;
            }
            .detail-card {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">W.T.F.</div>
        <ul class="nav-links">
            <li><a href="index.html">Каталог</a></li>
            <li><a href="library.html">Библиотека</a></li>
            <li><a href="wishlist.html">Избранное</a></li>
            <li><a href="cart.html">🛒 Корзина <span id="cartCount">0</span></a></li>
            <li><a href="#" id="loginBtn">Вход</a></li>
        </ul>
    </nav>
    <main class="container" id="gameDetailContainer">
        <a href="index.html" class="back-link">← Назад в каталог</a>
        <div class="detail-card">
            <h1 id="gameTitle"></h1>
            <img id="gameImage" src="" alt="">
            <p id="gameDescription" class="game-description"></p>
            <span id="gameGenre" class="game-genre"></span>
            <p id="gamePrice" class="price"></p>
            
            <div id="requirementsBlock" class="requirements">
                <h3>Системные требования</h3>
                <div id="requirementsContent"></div>
            </div>
            
            <div class="button-group">
                <button id="addToCartBtn">В корзину</button>
                <button id="addToWishlistBtn">В избранное</button>
            </div>
        </div>
    </main>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Вход в аккаунт</h2>
            <p class="modal-question">Выберите платформу для входа:</p>
            <div class="platform-slider">
                <div class="platform-option" data-platform="steam">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/steam.svg" alt="Steam">
                    <span>Steam</span>
                </div>
                <div class="platform-option" data-platform="gog">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/gogdotcom.svg" alt="GOG">
                    <span>GOG</span>
                </div>
                <div class="platform-option" data-platform="epic">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/epicgames.svg" alt="Epic Games">
                    <span>Epic Games</span>
                </div>
            </div>
            <button id="confirmLoginBtn" class="confirm-login-btn">Войти</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
