<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W.T.F. — Каталог</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">W.T.F.</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск игр...">
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Каталог</a></li>
            <li><a href="library.html">Библиотека</a></li>
            <li><a href="wishlist.html">Избранное</a></li>
            <li><a href="cart.html">🛒 Корзина <span id="cartCount">0</span></a></li>
            <li><a href="#" id="loginBtn">Вход</a></li>
        </ul>
    </nav>
    <main class="container">
        <div class="abbreviation-info">
            <span class="wtf-badge">W.T.F.</span> = <span class="wtf-mean">What The Fun</span>
            <span class="wtf-note">(да, вы правильно прочитали)</span>
        </div>
        <div class="filters">
            <select id="genreFilter">
                <option value="all">Все жанры</option>
                <option value="RPG">RPG</option>
                <option value="Стелс-экшен">Стелс-экшен</option>
                <option value="Инди">Инди</option>
                <option value="Экшен">Экшен</option>
                <option value="Стратегия">Стратегия</option>
            </select>
        </div>
        <div id="gamesGrid" class="games-grid"></div>
    </main>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Вход в аккаунт</h2>
            <p class="modal-question">Выберите платформу для входа:</p>
            <div class="platform-slider">
                <div class="platform-option" data-platform="steam">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/steam.svg" alt="Steam">
                    <span>Steam</span>
                </div>
                <div class="platform-option" data-platform="gog">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/gogdotcom.svg" alt="GOG">
                    <span>GOG</span>
                </div>
                <div class="platform-option" data-platform="epic">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/epicgames.svg" alt="Epic Games">
                    <span>Epic Games</span>
                </div>
            </div>
            <button id="confirmLoginBtn" class="confirm-login-btn">Войти</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
