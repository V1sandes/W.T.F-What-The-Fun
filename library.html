        .play-btn {
            margin: 0.75rem;

            background: linear-gradient(135deg, #27ae60, #2ecc71);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: calc(100% - 1.5rem);
            transition: all 0.3s;
        }
        .play-btn:hover {
            transform: scale(0.98);

        }
