<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W.T.F. — Библиотека</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🎮 W.T.F.</div>
        <ul class="nav-links">
            <li><a href="index.html">Каталог</a></li>
            <li><a href="library.html" class="active">Библиотека</a></li>
            <li><a href="wishlist.html">Избранное</a></li>
            <li><a href="cart.html">🛒 Корзина <span id="cartCount">0</span></a></li>
            <li><a href="#" id="loginBtn">🔐 Вход</a></li>
        </ul>
    </nav>
    <main class="container">
        <h1>📚 Моя библиотека</h1>
        <div id="libraryGrid" class="games-grid"></div>
    </main>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>🔐 Вход в аккаунт</h2>
            <p class="modal-question">Выберите платформу для входа:</p>
            <div class="platform-slider">
                <div class="platform-option" data-platform="steam">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/steam.svg" alt="Steam">
                    <span>Steam</span>
                </div>
                <div class="platform-option" data-platform="gog">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/gogdotcom.svg" alt="GOG">
                    <span>GOG</span>
                </div>
                <div class="platform-option" data-platform="epic">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/epicgames.svg" alt="Epic Games">
                    <span>Epic Games</span>
                </div>
            </div>
            <button id="confirmLoginBtn" class="confirm-login-btn">🚪 Войти</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
